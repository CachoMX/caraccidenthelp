<!--
  CAH Split Tester — Path B observability (v1.0.17+)
  ==================================================

  STATUS: Auto-injected by the plugin. No manual paste required.

  As of v1.0.17, the plugin's `PathBInjector` service hooks `wp_footer` and
  automatically injects assets/path-b.js when the request path matches
  /thank-you/ or /diminished-value-claim/ (paths derived from
  LeadStage::URL_QUALIFIED and LeadStage::URL_DISQUALIFIED).

  Why we moved away from manual paste: WordPress KSES strips <script> tags
  from page content for users without `unfiltered_html` capability, so
  pasting the snippet into the WP page editor left only the HTML comment
  block — the script never ran.

  If you previously pasted the older snippet manually into either page,
  REMOVE IT to avoid double-execution (the auto-injected script has a
  double-load guard, but it's cleaner to delete the orphaned content).

  Path matching:
    - LeadStage::URL_QUALIFIED    → /thank-you/
    - LeadStage::URL_DISQUALIFIED → /diminished-value-claim/

  Skip-reason matrix (each surfaces as a `rest.lead_skip.<reason>` source pill):
    no-cookie            → cah_variant_<test_id> cookie absent
    parse-failed-no-dot  → cookie present but malformed (no '.')
    parse-failed-no-ids  → cookie parts didn't yield valid ids
    from-cah-form        → ?from_cah_form=1 (HTML v1 already submitted)
    missing-stage        → ?lead_stage missing or invalid
    dedup-session        → sessionStorage already saw this lead
    fetch-failed         → /lead POST itself errored / non-2xx
    unknown              → reason wasn't in the whitelist (safety net)

  Comparison heuristics:
    if rest.lead_skip.no-cookie >> rest.lead.created   → cookie loss (Safari ITP, direct campaign links, expired)
    if rest.lead_skip.dedup-session is large           → users reloading thank-you (good — would otherwise dup)
    if rest.lead_skip.missing-stage > 0                → Growform redirect URL drifted; check Growform thank-you config
    if rest.lead_skip.fetch-failed > 0                 → server / network errors; check Hostinger PHP error log

  Source of truth for the JS itself: assets/path-b.js
-->
